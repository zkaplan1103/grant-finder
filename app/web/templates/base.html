<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Solar Grant Navigator{% endblock %}</title>
  <style>
    /* ---- Design tokens (color / type / spacing) -------------------- */
    :root {
      --c-bg: #0f1419;
      --c-surface: #1a2230;
      --c-surface-2: #222d3d;
      --c-border: #30404f;
      --c-text: #e7edf3;
      --c-muted: #9fb0c0;
      --c-accent: #f5b301;      /* solar amber */
      --c-accent-ink: #1a1300;
      --c-good: #3ddc97;
      --c-warn: #ffb454;
      --c-bad: #ff6b6b;

      --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
      --space-4: 16px; --space-5: 24px; --space-6: 32px; --space-8: 48px;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --maxw: 880px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--c-bg); color: var(--c-text);
      font-family: var(--font); line-height: 1.55;
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: var(--space-6) var(--space-4); }
    header.site { border-bottom: 1px solid var(--c-border); }
    header.site .wrap { padding-top: var(--space-5); padding-bottom: var(--space-5); }
    h1 { font-size: 1.6rem; margin: 0 0 var(--space-2); }
    h2 { font-size: 1.2rem; margin: var(--space-6) 0 var(--space-3); }
    p.lede { color: var(--c-muted); margin: 0; }
    a { color: var(--c-accent); }

    .card { background: var(--c-surface); border: 1px solid var(--c-border);
            border-radius: var(--radius); padding: var(--space-5); margin-bottom: var(--space-4); }
    label { display: block; font-weight: 600; margin-bottom: var(--space-1); }
    .field { margin-bottom: var(--space-4); }
    .hint { color: var(--c-muted); font-weight: 400; font-size: 0.85rem; }
    input, select, textarea {
      width: 100%; padding: var(--space-3); background: var(--c-surface-2);
      border: 1px solid var(--c-border); border-radius: 8px; color: var(--c-text);
      font-family: var(--font); font-size: 0.95rem;
    }
    textarea { min-height: 80px; resize: vertical; }
    fieldset { border: 1px solid var(--c-border); border-radius: var(--radius);
               padding: var(--space-4); margin: 0 0 var(--space-4); }
    legend { padding: 0 var(--space-2); color: var(--c-accent); font-weight: 700; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }

    button.primary {
      background: var(--c-accent); color: var(--c-accent-ink); border: 0;
      padding: var(--space-3) var(--space-5); border-radius: 8px; font-weight: 700;
      font-size: 1rem; cursor: pointer;
    }
    .banner { border-radius: var(--radius); padding: var(--space-3) var(--space-4);
              margin-bottom: var(--space-4); border: 1px solid var(--c-border); }
    .banner.warn { background: rgba(255,180,84,0.12); border-color: var(--c-warn); }
    .banner.error { background: rgba(255,107,107,0.12); border-color: var(--c-bad); }
    .banner.info { background: rgba(159,176,192,0.10); }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px;
             font-size: 0.78rem; font-weight: 700; }
    .badge.verified { background: rgba(61,220,151,0.15); color: var(--c-good); }
    .badge.needs_human { background: rgba(255,107,107,0.15); color: var(--c-bad); }
    .badge.draft { background: rgba(255,180,84,0.15); color: var(--c-warn); }
    .badge.source { background: var(--c-surface-2); color: var(--c-muted); }

    .score { font-variant-numeric: tabular-nums; font-weight: 700; }
    .muted { color: var(--c-muted); }
    .claim { border-left: 3px solid var(--c-bad); padding-left: var(--space-3);
             margin: var(--space-2) 0; }
    .draft-text { white-space: pre-wrap; background: var(--c-surface-2);
                  border-radius: 8px; padding: var(--space-3); margin-top: var(--space-2); }
    footer.site { color: var(--c-muted); font-size: 0.85rem; padding-bottom: var(--space-8); }
  </style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1>Solar Grant Navigator</h1>
      <p class="lede">Ranked, cited funding matches with verified application boilerplate.</p>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site">
    <div class="wrap">
      v1 &middot; federal results via grants.gov + a curated source list &middot;
      a human reviews and submits.
    </div>
  </footer>
</body>
</html>
