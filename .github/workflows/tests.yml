name: free-tests

# Runs ONLY the free test suite: mocked Anthropic client + mocked grants.gov
# HTTP (respx). No ANTHROPIC_API_KEY is set, so no money is ever spent here.

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify package imports
        run: python -c "import app"
      - name: Run free test suite
        # No ANTHROPIC_API_KEY in env -> the suite stays fully mocked.
        run: pytest -q
